<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Palpites</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      padding: 10px;
      margin: 0;
    }
    .card {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin: 10px 0;
      padding: 15px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
      word-wrap: break-word;
    }
    details {
      margin-top: 10px;
    }
    summary {
      font-weight: bold;
      cursor: pointer;
      color: #2a5d84;
    }

    /* Responsividade para celular */
    @media (max-width: 600px) {
      body {
        padding: 5px;
      }
      .card {
        font-size: 14px;
        padding: 10px;
      }
      summary {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <h1>Jogos e Palpites</h1>
  
</body>
</html>
