    th { background: #006400; color: #fff; }
    tr:nth-child(even) { background: #f2f2f2; }
    .titulo-grupo { background: #006400; color: #fff; font-size: 1.1em; }

    /* Responsividade para celular */
    @media (max-width: 768px) {
      body { padding: 10px; }
      h1 { font-size: 1.3em; }
      .quadrante { flex-direction: column; gap: 15px; }
      .grupo { min-width: 100%; }
      table { font-size: 0.85em; }
      th, td { padding: 6px; }
    }
  </style>

     document.getElementById("participanteInput").addEventListener("change", function() {
      const participante = this.value;
      const container = document.getElementById("resultado");
      container.innerHTML = "";

      if (!participante) return;

      const dadosFiltrados = dados.filter(d => d.participante === participante);
      const grupos = {};
      dadosFiltrados.forEach(d => {
        if (!grupos[d.grupo]) grupos[d.grupo] = [];
        grupos[d.grupo].push(d);
      });

      const quadrantes = [
        ["Grupo A","Grupo B"],
        ["Grupo C","Grupo D"],
        ["Grupo E","Grupo F"],
        ["Grupo G","Grupo H"],
        ["Grupo I","Grupo J"],
        ["Grupo K","Grupo L"]
      ];

      quadrantes.forEach(lista => {
        let htmlQuadrante = `<div class="quadrante">`;
        lista.forEach(grupo => {
          if (grupos[grupo]) {
            const timesOrdenados = grupos[grupo].sort((a,b) => b.pontos - a.pontos);
            let html = `<div class="grupo"><table>
              <tr><th colspan="2" class="titulo-grupo">${grupo}</th></tr>
              <tr><th>Time</th><th>Pontos</th></tr>`;
            timesOrdenados.forEach(t => {
              html += `<tr><td>${t.time}</td><td>${t.pontos}</td></tr>`;
            });
            html += `</table></div>`;
            htmlQuadrante += html;
          }
        });
        htmlQuadrante += `</div>`;
        container.innerHTML += htmlQuadrante;
      });
    });
  </script>
