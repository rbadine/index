<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ranking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    h1 {
      text-align: center;
      color: #2e7d32;
      font-size: 1.5em;
      margin: 15px 0;
    }
    .table-container {
      width: 100%;
      overflow-x: auto; /* scroll horizontal em telas pequenas */
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      min-width: 600px; /* evita quebra extrema */
    }
    th {
      background-color: #2e7d32;
      color: white;
      padding: 8px;
      font-size: 0.9em;
    }
    td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
      font-size: 0.85em;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    /* Ajustes para celular */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.2em;
      }
      th, td {
        padding: 5px;
        font-size: 0.75em;
      }
    }
  </style>
</head>
<body>
  <h1>Ranking dos Participantes</h1>
  <div class="table-container">
    <table id="ranking">
      <thead>
        <tr>
          <th>Classificação</th>
          <th>Participante</th>
          <th>Pontos</th>
          <th>Resultado</th>
          <th>Placar</th>
          <th>Prêmio</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const participantes = [
      {classificacao:1, nome:"Jhow", pontos:24, resultado:4, placar:4, premio:"R$ 198,00"},
      {classificacao:2, nome:"Tamara", pontos:20, resultado:6, placar:2, premio:"R$ 40,50"},
      {classificacao:2, nome:"Walter", pontos:20, resultado:4, placar:3, premio:"R$ 40,50"},
      {classificacao:2, nome:"Mauro Palmieri", pontos:20, resultado:6, placar:2, premio:"R$ 40,50"},
      {classificacao:2, nome:"Waleska", pontos:20, resultado:8, placar:1, premio:"R$ 40,50"},
      {classificacao:6, nome:"Thaís", pontos:16, resultado:4, placar:2, premio:"R$ 0,00"},
      {classificacao:7, nome:"José Bernardes Miranda", pontos:14, resultado:5, placar:1, premio:"R$ 0,00"},
      {classificacao:7, nome:"Lorenzo", pontos:14, resultado:7, placar:0, premio:"R$ 0,00"},
      {classificacao:7, nome:"Rene", pontos:14, resultado:3, placar:2, premio:"R$ 0,00"},
      {classificacao:7, nome:"Paulo Vinícius R Silva", pontos:14, resultado:5, placar:1, premio:"R$ 0,00"},
      {classificacao:7, nome:"Hiago", pontos:14, resultado:7, placar:0, premio:"R$ 0,00"},
      {classificacao:7, nome:"Tyssia", pontos:14, resultado:5, placar:1, premio:"R$ 0,00"},
      {classificacao:13, nome:"Ericelso", pontos:12, resultado:4, placar:1, premio:"R$ 0,00"},
      {classificacao:13, nome:"Lincoln Peres", pontos:12, resultado:6, placar:0, premio:"R$ 0,00"},
      {classificacao:13, nome:"Thiago Mota", pontos:12, resultado:6, placar:0, premio:"R$ 0,00"},
      {classificacao:13, nome:"Robson Francisco", pontos:12, resultado:4, placar:1, premio:"R$ 0,00"},
      {classificacao:17, nome:"Maria Cristiana", pontos:10, resultado:5, placar:0, premio:"R$ 0,00"},
      {classificacao:18, nome:"Saulo", pontos:8, resultado:4, placar:0, premio:"R$ 0,00"}
    ];

    const tbody = document.querySelector("#ranking tbody");

    participantes.forEach(p => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${p.classificacao}</td>
        <td>${p.nome}</td>
        <td>${p.pontos}</td>
        <td>${p.resultado}</td>
        <td>${p.placar}</td>
        <td>${p.premio}</td>
      `;
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
