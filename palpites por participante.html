<meta charset="UTF-8">

<title>Palpites por Jogador</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 10px;
    padding: 0;
    background: #f9f9f9;
  }

  h3 {
    text-align: center;
    margin-top: 15px;
  }

  .container {
    position: relative;
    width: 100%;
    max-width: 400px;
    margin-bottom: 15px;
  }

  #jogadorInput {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  #sugestoes {
    border: 1px solid #ccc;
    border-top: none;
    width: 100%;
    max-height: 150px;
    overflow-y: auto;
    background: #fff;
    position: absolute;
    z-index: 1000;
  }

  #sugestoes div {
    padding: 8px;
    cursor: pointer;
  }

  #sugestoes div:hover {
    background-color: #f0f0f0;
  }

  #resultado {
    background: #fff;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    background: #f1f1f1;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    font-size: 14px;
  }

  @media (max-width: 600px) {
    body {
      font-size: 14px;
    }
    #jogadorInput {
      font-size: 14px;
      padding: 8px;
    }
    li {
      font-size: 13px;
      padding: 8px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <input type="text" id="jogadorInput" placeholder="Pesquisar jogador...">
  <div id="sugestoes"></div>
</div>

// Agrupar palpites por jogador
const jogadores = {};
palpites.forEach(p => {
  if (!jogadores[p.jogador]) {
    jogadores[p.jogador] = [];
  }
  jogadores[p.jogador].push(p);
});

const input = document.getElementById("jogadorInput");
const sugestoes = document.getElementById("sugestoes");
const resultadoDiv = document.getElementById("resultado");

function mostrarNomes(lista) {
  sugestoes.innerHTML = '';
  lista.forEach(nome => {
    const div = document.createElement("div");
    div.textContent = nome;
    div.addEventListener("click", () => {
      input.value = nome;
      sugestoes.innerHTML = '';
      mostrarPalpites(nome);
    });
    sugestoes.appendChild(div);
  });
}

function mostrarPalpites(jogador) {
  resultadoDiv.innerHTML = `<h3>Palpites de ${jogador}</h3>`;
  if (jogadores[jogador]) {
    const lista = document.createElement("ul");
    jogadores[jogador].forEach(p => {
      const item = document.createElement("li");
      item.textContent = `${p.pontos}: ${p.time1} ${p.placar1} x ${p.placar2} ${p.time2} → ${p.resultado}`;
      lista.appendChild(item);
    });
    resultadoDiv.appendChild(lista);
  } else {
    resultadoDiv.innerHTML += "<p>Nenhum palpite registrado.</p>";
  }
}

// Mostrar todos os nomes ao clicar
input.addEventListener("focus", () => {
  mostrarNomes(Object.keys(jogadores));
});

// Filtrar conforme digita
input.addEventListener("keyup", () => {
  const filtro = input.value.toLowerCase();
  const filtrados = Object.keys(jogadores).filter(nome => nome.toLowerCase().includes(filtro));
  mostrarNomes(filtrados);
});

// Esconder lista ao clicar fora
document.addEventListener("click", (event) => {
  if (!input.contains(event.target) && !sugestoes.contains(event.target)) {
    sugestoes.innerHTML = '';
  }
});
</script>
