// Agrupar palpites por jogador
const jogadores = {};
palpites.forEach(p => {
  if (!jogadores[p.jogador]) {
    jogadores[p.jogador] = [];
  }
  jogadores[p.jogador].push(p);
});

// Popular o <select> com os nomes dos jogadores
const select = document.getElementById("jogadorSelect");
Object.keys(jogadores).forEach(nome => {
  const option = document.createElement("option");
  option.value = nome;
  option.textContent = nome;
  select.appendChild(option);
});

// Mostrar palpites ao selecionar jogador
select.addEventListener("change", function() {
  const jogador = this.value;
  const resultadoDiv = document.getElementById("resultado");
  resultadoDiv.innerHTML = `<h3>Palpites de ${jogador}</h3>`;
  
  if (jogadores[jogador]) {
    const lista = document.createElement("ul");
    jogadores[jogador].forEach(p => {
      const item = document.createElement("li");
      item.textContent = `${p.data}: ${p.time1} ${p.placar1} x ${p.placar2} ${p.time2} → ${p.resultado}`;
      lista.appendChild(item);
    });
    resultadoDiv.appendChild(lista);
  } else {
    resultadoDiv.innerHTML += "<p>Nenhum palpite registrado.</p>";
  }
});
</script>
